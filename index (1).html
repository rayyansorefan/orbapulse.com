<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orba Pulse</title>
    <meta name="description" content="Something is coming. A new way to understand how you feel.">
    <meta property="og:title" content="Orba Pulse">
    <meta property="og:description" content="Something is coming. A new way to understand how you feel.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://orbapulse.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #03020A;
            color: #EEE8FF;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* Atmospheric layers */
        .atmosphere {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .atmosphere::before {
            content: '';
            position: absolute;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 160%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(157,141,241,0.06) 0%, transparent 60%);
        }

        /* Grain texture */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .page {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 28px;
            max-width: 520px;
            width: 100%;
        }

        /* ── Orb ── */
        .orb-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 56px;
        }
        .orb-glow-1 {
            position: absolute;
            inset: -60%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(157,141,241,0.07) 0%, transparent 65%);
            animation: breathe 7s ease-in-out infinite;
        }
        .orb-glow-2 {
            position: absolute;
            inset: -30%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(157,141,241,0.12) 0%, transparent 60%);
            animation: breathe 7s ease-in-out infinite 1s;
        }
        .orb-glow-3 {
            position: absolute;
            inset: -10%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,97,255,0.15) 0%, transparent 55%);
            animation: breathe 5s ease-in-out infinite 0.5s;
        }
        .orb-sphere {
            position: absolute;
            inset: 12%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #B8A9F7, #7B61FF 50%, #3D2E80);
            box-shadow:
                0 0 120px rgba(157,141,241,0.35),
                0 0 40px rgba(157,141,241,0.25),
                inset 0 -25px 50px rgba(40,25,100,0.6);
            animation: pulse 7s ease-in-out infinite;
        }
        .orb-highlight {
            position: absolute;
            top: 20%;
            left: 22%;
            width: 32%;
            height: 22%;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
            transform: rotate(-25deg);
        }
        .orb-inner {
            position: absolute;
            top: 28%;
            left: 30%;
            width: 35%;
            height: 35%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,191,255,0.25) 0%, transparent 70%);
            animation: drift 9s ease-in-out infinite;
        }

        /* Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: #C8BFFF;
            animation: orbit var(--d) linear infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(0.97); }
            50% { transform: scale(1.03); }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(10%, -8%); }
            66% { transform: translate(-8%, 10%); }
        }
        @keyframes orbit {
            from { transform: rotate(var(--s)) translateX(var(--r)) rotate(calc(-1 * var(--s))); }
            to { transform: rotate(calc(var(--s) + 360deg)) translateX(var(--r)) rotate(calc(-1 * (var(--s) + 360deg))); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Typography ── */
        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 48px;
            letter-spacing: 0.1em;
            color: #9D8DF1;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1.2s ease 0.3s forwards;
        }

        /* The hook — curiosity gap */
        .hook {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: 21px;
            color: rgba(255,255,255,0.35);
            line-height: 1.7;
            margin-bottom: 44px;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeUp 1.2s ease 0.7s forwards;
        }

        /* Coming soon pill — scarcity/exclusivity */
        .coming {
            display: inline-block;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #9D8DF1;
            border: 1px solid rgba(157,141,241,0.25);
            padding: 10px 28px;
            border-radius: 30px;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeUp 1s ease 1.1s forwards;
            background: rgba(157,141,241,0.04);
        }

        /* Thin divider */
        .line {
            width: 40px;
            height: 1px;
            background: rgba(157,141,241,0.2);
            margin: 0 auto 36px;
            opacity: 0;
            animation: fadeIn 1.5s ease 1.4s forwards;
        }

        /* Instagram CTA — the single action */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            letter-spacing: 0.06em;
            padding: 12px 24px;
            border-radius: 12px;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeUp 1s ease 1.6s forwards;
        }
        .cta:hover {
            color: #9D8DF1;
            background: rgba(157,141,241,0.06);
        }
        .cta-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9D8DF1;
            opacity: 0.5;
            animation: breathe 3s ease-in-out infinite;
        }

        /* Footer — barely visible */
        .foot {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.08);
            letter-spacing: 0.1em;
            z-index: 2;
        }
        .foot a {
            color: rgba(255,255,255,0.08);
            text-decoration: none;
        }
        .foot a:hover {
            color: rgba(157,141,241,0.3);
        }

        @media (max-width: 480px) {
            .brand { font-size: 38px; }
            .hook { font-size: 18px; }
            .orb-wrap { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>
    <div class="atmosphere"></div>
    <div class="grain"></div>

    <div class="page">
        <!-- The orb — visual anchor, creates intrigue -->
        <div class="orb-wrap">
            <div class="orb-glow-1"></div>
            <div class="orb-glow-2"></div>
            <div class="orb-glow-3"></div>
            <div class="orb-sphere">
                <div class="orb-highlight"></div>
                <div class="orb-inner"></div>
            </div>
            <div class="particle" style="width:4px;height:4px;--s:20deg;--r:120px;--d:10s;top:50%;left:50%;opacity:0.4"></div>
            <div class="particle" style="width:3px;height:3px;--s:80deg;--r:110px;--d:13s;top:50%;left:50%;opacity:0.3"></div>
            <div class="particle" style="width:5px;height:5px;--s:150deg;--r:130px;--d:9s;top:50%;left:50%;opacity:0.5"></div>
            <div class="particle" style="width:2px;height:2px;--s:210deg;--r:105px;--d:14s;top:50%;left:50%;opacity:0.3"></div>
            <div class="particle" style="width:3px;height:3px;--s:280deg;--r:125px;--d:11s;top:50%;left:50%;opacity:0.4"></div>
            <div class="particle" style="width:4px;height:4px;--s:340deg;--r:115px;--d:12s;top:50%;left:50%;opacity:0.35"></div>
        </div>

        <!-- Brand name -->
        <h1 class="brand">orba pulse</h1>

        <!-- The hook: curiosity gap + emotional resonance -->
        <p class="hook">you already know how you feel.<br>you just haven't had a place to put it.</p>

        <!-- Scarcity signal -->
        <div class="coming">coming soon</div>

        <div class="line"></div>

        <!-- Single CTA — follow for updates -->
        <a href="https://instagram.com/orba_pulse" target="_blank" class="cta">
            <span class="cta-dot"></span>
            follow the pulse — @orba_pulse
        </a>
    </div>

    <div class="foot">
        <a href="privacy.html">privacy</a> &nbsp;&middot;&nbsp; &copy; 2026 orba pulse
    </div>
</body>
</html>
